# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo on Render and it reads this file to configure the
# service automatically. Vars marked `sync: false` must be filled in from
# the Render dashboard after the first deploy (secrets aren't committed).
services:
  - type: web
    name: caseflow-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Neon (or other) Postgres connection string, include ?sslmode=require
      - key: CLIENT_URL
        sync: false # the deployed frontend's origin, e.g. https://caseflow.pages.dev
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: STORAGE_DRIVER
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        sync: false # Cloudflare R2 account endpoint
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "300"
