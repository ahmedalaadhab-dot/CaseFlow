server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any non-file route serves index.html so React Router
    # can handle client-side routes like /cases/123 on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and uploaded-file requests to the backend container so the
    # browser only ever talks to this single origin (avoids CORS entirely
    # in production). Adjust `api` to match your docker-compose service name.
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://api:4000/uploads/;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
